<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- FORM SECTION -->
  <div class="form">
    <h2>Enter Details</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">

    <textarea id="education" placeholder="Education"></textarea>
    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>

    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="downloadPDF()">Download PDF</button>

  </div>

  <!-- PREVIEW SECTION -->
  <div class="preview" id="resume">
    <h1 id="pname">Your Name</h1>
    <p id="pemail">Email</p>
    <p id="pphone">Phone</p>

    <h3>Education</h3>
    <p id="pedu"></p>

    <h3>Skills</h3>
    <p id="pskills"></p>

    <h3>Experience</h3>
    <p id="pexp"></p>
  </div>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
