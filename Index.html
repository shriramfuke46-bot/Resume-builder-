<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div id="home-page" class="container">
        <h1>Resume Builder</h1>
        <p>तुमचा प्रोफेशनल रिझ्युमे काही मिनिटांत तयार करा!</p>
        <button onclick="showForm()">Create Resume Now</button>
    </div>

    <div id="form-page" class="container" style="display:none;">
        <h2>तुमची माहिती भरा</h2>
        <div class="form-grid">
            <input type="text" id="name" placeholder="पूर्ण नाव">
            <input type="text" id="role" placeholder="नोकरीचे पद (Job Title)">
            <input type="email" id="email" placeholder="ईमेल आयडी">
            <input type="text" id="phone" placeholder="फोन नंबर">
            <textarea id="about" placeholder="तुमच्याबद्दल थोडक्यात माहिती (Profile Info)"></textarea>
        </div>

        <h3>टेम्पलेट निवडा:</h3>
        <div class="template-choice">
            <label><input type="radio" name="temp" value="temp1" checked> Template 1 (Harper Style)</label>
            <label><input type="radio" name="temp" value="temp2"> Template 2 (Jonathan Style)</label>
        </div>

        <button onclick="generateResume()">Generate & Preview</button>
    </div>

    <div id="preview-page" style="display:none;">
        <div id="resume-content">
            </div>
        <div class="controls">
            <button onclick="downloadPDF()">Download PDF</button>
            <button class="back-btn" onclick="location.reload()">Back</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
